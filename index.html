<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <!-- ── Méta critiques (priorité maximale) ── -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nassim CHEMIL - Concepteur &amp; designer digital, IA No Code</title>
  <meta name="description" content="Portfolio de Nassim CHEMIL, Concepteur &amp; designer digital IA No Code." />

  <!-- ── Pré-connexions CDN (avant tout téléchargement) ── -->
  <link rel="dns-prefetch" href="https://cdn.tailwindcss.com" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <!-- ── Préchargement des polices (haute priorité) ── -->
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" as="style" />
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/style.css" as="style" />

  <!-- ── Tailwind CSS (nécessaire avant le parsing des classes) ── -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#272727',
            surface: '#0F0F11',
            border: '#27272A',
            primary: '#27A06C',
            'primary-hover': '#1F8A5C',
            'text-main': '#EDEDED',
            'text-secondary': 'rgb(236, 236, 236)', // Gris plus clair (Zinc-300) pour meilleure lisibilité
            'text-muted': '#A1A1AA', // Gris moyen (Zinc-400) au lieu de Zinc-600
          },
          fontFamily: {
            sans: ['Geist Sans', 'sans-serif'],
            mono: ['Geist Mono', 'monospace'], // Police technique pour boutons/légendes
          },
          fontSize: {
            'xs': '0.875rem', // Force 14px minimum pour text-xs
            'sm': '0.875rem', // 14px
            'base': '1rem', // 16px
            'lg': '1.125rem',
            'xl': '1.25rem',
            '2xl': '1.5rem',
            '3xl': '1.875rem',
            '4xl': '2.25rem',
            '5xl': '3rem',
            '6xl': '3.75rem',
            '7xl': '4.5rem',
            '8xl': '6rem',
            '9xl': '8rem',
          },
          borderRadius: {
            'none': '0',
            'sm': '5px',
            DEFAULT: '5px', // Standardisation stricte à 5px
            'md': '5px',
            'lg': '5px',
            'xl': '5px',
            '2xl': '5px',
            '3xl': '5px',
            'full': '9999px', // On garde full pour les cercles parfaits
          },
          letterSpacing: {
            tighter: '-0.04em',
            tight: '-0.02em',
            normal: '0',
            wide: '0.04em',
            wider: '0.08em',
            widest: '0.15em',
          },
          animation: {
            'fade-in': 'fadeIn 0.6s ease-out forwards',
            'slide-up-fade': 'slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-up-delay': 'slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards',
            'ripple': 'ripple 1.5s cubic-bezier(0, 0, 0.2, 1) infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUpFade: {
              '0%': { transform: 'translateY(40px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            ripple: {
              '0%': { transform: 'scale(1)', opacity: '0.8' },
              '100%': { transform: 'scale(4)', opacity: '0' },
            }
          }
        },
      },
    }
  </script>

  <!-- ── Geist Fonts (après preload, le navigateur les applique immédiatement) ── -->
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/style.css" rel="stylesheet">

  <!-- ── Styles critiques inline ── -->
  <style>
    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: rgb(17, 17, 17);
      color: #EDEDED;
      font-family: 'Geist Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Ajustement global espacement lettres demandé */
    .text-text-secondary,
    .text-lg {
      letter-spacing: 1px;
    }

    /* Utilitaires pour le style "Tech" */
    .tech-label {
      font-family: 'Geist Mono', monospace;
      font-size: 0.875rem;
      /* 14px */
      line-height: 1.25rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    /* Classe spécifique demandée .txt-sm */
    .txt-sm {
      font-size: 14px;
      line-height: 1.25rem;
    }

    .tech-heading {
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    /* Lenis Smooth Scroll Recommended CSS */
    html.lenis,
    html.lenis body {
      height: auto;
    }

    .lenis.lenis-smooth {
      scroll-behavior: auto !important;
    }

    .lenis.lenis-smooth [data-lenis-prevent] {
      overscroll-behavior: contain;
    }

    .lenis.lenis-stopped {
      overflow: hidden;
    }

    .lenis.lenis-scrolling iframe {
      pointer-events: none;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #151515;
    }

    ::-webkit-scrollbar-thumb {
      background: #27272A;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3F3F46;
    }

    #root {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    /* Typewriter char fade-in / fade-out */
    @keyframes tw-char-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes tw-char-out {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* Typewriter cursor blink */
    @keyframes typewriter-blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
